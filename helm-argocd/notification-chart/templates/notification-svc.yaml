apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification.fullname" . }}
  labels:
    {{ include "notification.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port  }}
      targetPort: http
      protocol: TCP

  selector:
    {{- include "notification.selectorLabels" . | nindent 4 }}    