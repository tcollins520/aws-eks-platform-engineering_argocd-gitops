apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "usermgmt.configMapName" . }}
  labels:
{{ include "usermgmt.labels" . | indent 4 }}

data:
  DB_HOSTNAME: {{ .Values.config.dbHostname | quote }}
  DB_PORT: {{ .Values.config.dbPort | quote }}
  DB_NAME: {{ .Values.config.dbName | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfile | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}