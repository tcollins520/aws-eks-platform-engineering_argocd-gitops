apiVersion: v1
kind: Service
metadata:
  name: {{ include "usermgmt.fullname" . }}
  labels:
    {{ include "usermgmt.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port  }}
      targetPort: http
      protocol: TCP

  selector:
    {{- include "usermgmt.selectorLabels" . | nindent 4 }}    