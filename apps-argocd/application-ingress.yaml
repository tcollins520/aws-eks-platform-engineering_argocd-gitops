apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ingress-common
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/tcollins520/aws-eks-platform-engineering_argocd-gitops.git
    targetRevision: main
    path: helm-argocd/ingress-common

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true